workflows:
  default-workflow:
    name: Android build
    max_build_duration: 60

    environment:
     flutter: 3.22.0

    scripts:
      - name: Clean project
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release

    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
